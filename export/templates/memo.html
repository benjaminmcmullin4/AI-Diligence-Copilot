<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} — IC Memo | Traverse</title>
    <link rel="stylesheet" href="memo.css">
    <style>{{ inline_css }}</style>
</head>
<body>
    <!-- Cover Page -->
    <div class="cover-page">
        <div class="brand">Traverse</div>
        <div class="subtitle">Diligence Copilot · Mercato Partners</div>
        <div class="company-name">{{ company_name }}</div>
        <div class="memo-type">Investment Committee Memorandum</div>
        <div class="meta">
            {{ date }} &nbsp;|&nbsp; {{ sector }} &nbsp;|&nbsp; {{ business_model_label }}
        </div>
        <div class="confidential">CONFIDENTIAL</div>
    </div>

    <!-- Memo Content -->
    <div class="memo-body">
        {{ memo_html_content }}
    </div>

    <!-- Footer -->
    <div class="memo-footer">
        Prepared by Traverse Diligence Copilot &nbsp;|&nbsp; {{ date }} &nbsp;|&nbsp; Confidential
    </div>
</body>
</html>
